<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

          <h1>Password Generator</h1>
       <div class="display-container">

           <input readonly placeholder="Password" class="display" data-passwordDisplay>
             <button class="copyBtn" data-copy>
                <span class="tooltip" data-copyMsg></span>
               <img src="WhatsApp Image 2026-03-10 at 9.19.02 PM.jpeg" alt="" width="15" height="15">
             </button>
       </div>
<div class="input-container">
    <div class="length-container">
        <p>Password Length</p>
        <p data-lengthNumber>0</p>
    </div>

<input type="range" min="1" max="20" class="slider" step="1" data-lengthSlider>
<!-- Checkboxes -->
<div class="check">
    <input type="checkbox" id="uppercase">
    <label for="upeercase">Include Uppercase Letters</label>
</div>

<div  class="check">
    <input type="checkbox" id="lowercase">
    <label for="lowercase">Include Lowercase Letters</label>
</div>


<div  class="check">
    <input type="checkbox" id="numbers">
    <label for="numbers">Include Numbers</label>
</div>


<div  class="check">
    <input type="checkbox" id="symbols">
    <label for="symbols">Include Symbols</label>
</div>


<div class="strength-container">
    <p>Strength</p>

    <div class="strength-result">
        <p class="strength-text" data-strengthText></p>
        <div class="indicator" data-indicator></div>
    </div>
</div>


<button class="generateButton"> GENERATE PASSWORD</button>
</div>

    </div>





<script src="script.js"></script>
</body>
</html>
